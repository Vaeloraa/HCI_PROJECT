<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow A 模块 — 眼动追踪与感知</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            overflow: hidden;
            /* 默认隐藏光标（追踪模式下不需要），校准时会通过 JS 添加 .calibrating 类恢复 */
            cursor: none;
        }
        body.calibrating {
            cursor: default;
        }

        /* 信息面板 */
        .panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(16, 16, 36, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 20px 24px;
            min-width: 280px;
            backdrop-filter: blur(20px);
            z-index: 50000;
            pointer-events: auto;
            cursor: default;
        }

        .panel h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .panel .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 13px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .panel .row:last-child {
            border-bottom: none;
        }

        .panel .label {
            color: #999;
        }

        .panel .value {
            color: #fff;
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'Consolas', monospace;
        }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-focused   { background: rgba(60, 200, 120, 0.2); color: #3cc878; }
        .badge-distracted { background: rgba(255, 180, 60, 0.2); color: #ffb43c; }
        .badge-struggling { background: rgba(255, 100, 100, 0.2); color: #ff6464; }

        .dot-legend {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .dot-legend span {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #aaa;
        }

        .dot-legend .mini-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .mini-dot-raw { background: rgba(255, 80, 80, 0.7); }
        .mini-dot-smooth { background: rgba(60, 140, 255, 0.9); }

        /* 状态提示 */
        .status-hint {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(16, 16, 36, 0.9);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 20px 28px;
            font-size: 15px;
            color: #fff;
            text-align: center;
            z-index: 100001;
            pointer-events: none;
            display: none;
            transition: opacity 0.3s;
        }

        /* 校准提示 */
        .calibration-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200000;
            cursor: default;
        }
        .calibration-overlay.hidden { display: none; }

        .calibration-overlay .cal-box {
            background: #1e1e3a;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 40px 48px;
            text-align: center;
            max-width: 420px;
        }

        .calibration-overlay h3 {
            font-size: 20px;
            margin-bottom: 12px;
            color: #fff;
        }

        .calibration-overlay p {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .calibration-overlay button {
            background: #4466ff;
            color: #fff;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .calibration-overlay button:hover {
            background: #3355ee;
        }

        .calibration-overlay button:disabled {
            background: #555;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <!-- 校准引导遮罩 -->
    <div id="calibration-overlay" class="calibration-overlay">
        <div class="cal-box">
            <h3>👁️ 开始眼动校准</h3>
            <p id="calibration-text">
                WebGazer 需要几秒钟进行初始校准。<br>
                点击下方按钮后，请 <strong>注视屏幕上出现的数字</strong>，<br>
                依次看完每一个校准点。
            </p>
            <p style="font-size:12px; color:#888;">
                （校准时会暂时显示 WebGazer 的面部检测框，校准完成后自动隐藏）
            </p>
            <button id="btn-start-calibration">
                开始校准
            </button>
        </div>
    </div>

    <!-- 状态提示 -->
    <div id="status-hint" class="status-hint"></div>

    <!-- 信息面板 -->
    <div class="panel">
        <h2>📡 FocusFlow A 模块</h2>
        <div class="row">
            <span class="label">WebSocket</span>
            <span class="value" id="ws-status">未连接</span>
        </div>
        <div class="row">
            <span class="label">用户状态</span>
            <span class="value" id="user-state">
                <span class="badge badge-focused">Focused</span>
            </span>
        </div>
        <div class="row">
            <span class="label">原始坐标</span>
            <span class="value" id="raw-coords">-</span>
        </div>
        <div class="row">
            <span class="label">平滑坐标</span>
            <span class="value" id="smooth-coords">-</span>
        </div>
        <div class="row">
            <span class="label">目标行</span>
            <span class="value" id="target-row">-</span>
        </div>
        <div class="row">
            <span class="label">提醒级别</span>
            <span class="value" id="alert-level">0</span>
        </div>
        <div class="row">
            <span class="label">置信度</span>
            <span class="value" id="confidence">-</span>
        </div>
        <div class="row">
            <span class="label">视线区域</span>
            <span class="value" id="gaze-zone">-</span>
        </div>

        <div class="dot-legend">
            <span><span class="mini-dot mini-dot-raw"></span>原始</span>
            <span><span class="mini-dot mini-dot-smooth"></span>平滑</span>
        </div>
    </div>

    <!-- ==================== 脚本加载 ==================== -->

    <!-- 0. 协议检测 (在一切脚本之前, 关闭 body 渲染检测) -->
    <script>
    (function () {
        var protocol = window.location.protocol;
        if (protocol === 'file:') {
            // 用户直接双击打开了 HTML 文件 —— 禁止加载后续脚本
            // 显示清晰的引导提示
            document.write(
                '<div style="' +
                'position:fixed;inset:0;background:#1a1a2e;color:#e0e0e0;' +
                'display:flex;align-items:center;justify-content:center;' +
                'font-family:-apple-system,BlinkMacSystemFont,sans-serif;z-index:999999;">' +
                '<div style="background:#1e1e3a;border:1px solid rgba(255,255,255,0.15);' +
                'border-radius:16px;padding:40px 48px;max-width:520px;text-align:center;">' +
                '<h3 style="font-size:22px;color:#ff6464;margin-bottom:16px;">⚠️ 请不要直接双击 HTML 文件</h3>' +
                '<p style="font-size:14px;color:#aaa;line-height:1.8;margin-bottom:8px;">' +
                'WebGazer 眼动追踪依赖 <code style="background:#333;padding:2px 6px;border-radius:4px;">getUserMedia</code> API，' +
                '<br>该 API <strong>只能在 HTTP(S) 协议</strong>下使用。<br>' +
                '<code style="background:#333;padding:2px 6px;border-radius:4px;">file://</code> 协议会被浏览器阻止。</p>' +
                '<div style="background:#0a0a1e;border-radius:10px;padding:16px 20px;' +
                'margin:20px 0;text-align:left;font-family:Consolas,monospace;font-size:13px;color:#3cc878;">' +
                '<p style="margin:0 0 8px 0;color:#fff;">📋 请按以下步骤启动：</p>' +
                '<div style="color:#aaa;">' +
                '<p style="margin:4px 0;">1️⃣ 打开终端 (PowerShell / CMD)</p>' +
                '<p style="margin:4px 0;color:#4466ff;">2️⃣ 运行: <code style="background:#333;color:#ffb43c;">node A_module/server/http-server.js</code></p>' +
                '<p style="margin:4px 0;color:#4466ff;">3️⃣ 运行: <code style="background:#333;color:#ffb43c;">node A_module/server/ws-server.js</code></p>' +
                '<p style="margin:4px 0;">4️⃣ 在浏览器访问: <code style="background:#333;color:#3cc878;">http://localhost:3000</code></p>' +
                '</div>' +
                '</div>' +
                '<button onclick="window.location.href=\'http://localhost:3000\'" ' +
                'style="background:#4466ff;color:#fff;border:none;padding:12px 32px;' +
                'border-radius:8px;font-size:15px;cursor:pointer;margin-top:8px;">' +
                '🚀 直接跳转 http://localhost:3000</button>' +
                '<p style="font-size:11px;color:#666;margin-top:12px;">' +
                '（如果点击跳转后页面报错，说明服务器尚未启动，请先运行上述命令）</p>' +
                '</div></div>'
            );
            // 停止渲染后续内容
            throw new Error('STOP_RENDER');
        }
    })();
    </script>

    <!-- 1. WebGazer (本地托管, 避免 CDN 被墙) -->
    <script src="js/webgazer-local.js"></script>

    <!-- 2. 卡尔曼滤波器 -->
    <script src="js/kalman-filter.js"></script>

    <!-- 3. WebGazer 初始化与可视化 -->
    <script src="js/webgazer-init.js"></script>

    <!-- 4. 多源感知 -->
    <script src="js/perception.js"></script>

    <!-- 5. 状态机 -->
    <script src="js/state-machine.js"></script>

    <!-- 6. WebSocket 客户端 -->
    <script src="js/ws-client.js"></script>

    <!-- 7. 主控逻辑 -->
    <script>
    document.addEventListener('DOMContentLoaded', function () {

    // ---- 全局状态 ----
    let userState = 'Focused';
    let targetRow = -1;
    let alertLevel = 0;

    // ---- UI 元素 ----
    const elWsStatus   = document.getElementById('ws-status');
    const elUserState  = document.getElementById('user-state');
    const elRawCoords  = document.getElementById('raw-coords');
    const elSmoothCoords = document.getElementById('smooth-coords');
    const elTargetRow  = document.getElementById('target-row');
    const elAlertLevel = document.getElementById('alert-level');
    const elConfidence = document.getElementById('confidence');
    const elGazeZone = document.getElementById('gaze-zone');
    const elStatusHint = document.getElementById('status-hint');
    const elCalibrationOverlay = document.getElementById('calibration-overlay');

    // 预检查 webgazer 是否加载成功
    console.log('[Main] 检查 webgazer 加载状态...');
    console.log('[Main]   typeof webgazer:', typeof webgazer);
    const btnCalibrate = document.getElementById('btn-start-calibration');
    if (typeof webgazer === 'undefined') {
        btnCalibrate.disabled = true;
        btnCalibrate.textContent = 'webgazer 加载失败 (检查网络)';
        alert('❌ webgazer.js 加载失败。\n\n请检查网络连接，或重新打开页面。');
    } else {
        console.log('[Main] ✅ webgazer 已就绪');
        // 绑定点击事件 (必须在这里绑定, 因为 startCalibration 在闭包内)
        btnCalibrate.addEventListener('click', startCalibration);
    }

    // ---- 阅读区域缓存 ----
    let readingRegions = [];

    // ============================================================
    //  校准流程
    // ============================================================

    async function startCalibration() {
        const btn = document.getElementById('btn-start-calibration');
        const calText = document.getElementById('calibration-text');
        btn.disabled = true;
        btn.textContent = '正在启动摄像头...';

        // 更新提示文字
        calText.innerHTML =
            '<strong>屏幕上会出现数字校准点</strong><br>' +
            '请<strong>注视数字</strong>并用鼠标<strong>点击它</strong><br>' +
            '重复 9 次，每次数字会移到不同位置';

        // 关键: 立即隐藏遮罩层，否则 z-index 会挡住 WebGazer 的校准数字
        // 同时恢复光标（校准期间需要用户看到鼠标点击数字）
        elCalibrationOverlay.classList.add('hidden');
        document.body.classList.add('calibrating');

        const success = await GazeTracker.init({
            processNoise: 0.00005,   // 极低过程噪声 → 高度信任匀速模型
            measureNoise: 400,       // 极高测量噪声 → 强烈过滤抖动
            emaAlpha: 0.12,          // EMA 平滑系数 (越低越平滑)
            deadZone: 3,             // 死区 3px (微小抖动不移动)
            calibrationPoints: 9,
        });

        if (success) {
            elCalibrationOverlay.classList.add('hidden');
            document.body.classList.remove('calibrating');

            // 初始化多源感知和状态机
            Perception.init();
            StateMachine.init();

            // 连接 WebSocket
            connectWS();

            // 启动定时发送 (100ms 间隔)
            WSClient.startSending(buildDataPacket);

            console.log('[Main] ✅ FocusFlow A 模块已完全启动');
        } else {
            // 恢复遮罩状态
            elCalibrationOverlay.style.pointerEvents = '';
            elCalibrationOverlay.style.background = '';
            document.body.classList.remove('calibrating');
            btn.disabled = false;
            btn.textContent = '重试校准';
            calText.innerHTML =
                'WebGazer 需要几秒钟进行初始校准。<br>' +
                '点击下方按钮后，请 <strong>注视屏幕上出现的数字</strong>，<br>' +
                '依次看完每一个校准点。';
            alert(
                '❌ 眼动追踪初始化失败 (60 秒超时)\n\n' +
                '可能原因:\n' +
                '1. 摄像头权限未授予 → 请在浏览器设置中允许访问摄像头\n' +
                '2. FaceMesh 模型下载失败 → 请检查网络连接\n' +
                '3. 请通过 http://localhost:3000 访问 (不要直接用 file://)\n' +
                '4. 浏览器不支持 → 建议使用 Chrome/Edge\n\n' +
                '请打开控制台 (F12) 查看详细日志后重试。'
            );
        }
    }

    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    // ============================================================
    //  WebSocket
    // ============================================================

    function connectWS() {
        WSClient.connect('ws://localhost:8080', {
            onRegionsReceived: function (regions) {
                readingRegions = regions;
                console.log('[Main] 阅读区域已更新:', readingRegions.length + ' 段落');
            },
            onConnected: function () {
                elWsStatus.textContent = '已连接';
                elWsStatus.style.color = '#3cc878';
            },
            onDisconnected: function () {
                elWsStatus.textContent = '断开';
                elWsStatus.style.color = '#ff6464';
            },
        });
    }

    // ============================================================
    //  数据包组装 (每隔 100ms 调用一次)
    // ============================================================

    function buildDataPacket() {
        var raw = GazeTracker.getRawGaze();
        var smooth = GazeTracker.getSmoothedGaze();

        // ---- 多源感知更新 ----
        Perception.update(raw);
        var headPose = Perception.getHeadPose();
        var isOffScreen = Perception.getOffScreenDuration() > 0;

        // ---- 状态机更新 (v2.0: 基于平滑Y坐标的3区域判定) ----
        var smoothY = smooth.valid ? smooth.y : null;
        StateMachine.update(
            smoothY,
            Perception.isFacePresent(),
            headPose.isLookingAway,
            isOffScreen
        );
        userState = StateMachine.getState();
        alertLevel = StateMachine.getAlertLevel();
        var zoneLabel = ['上', '中', '下'][StateMachine.getCurrentZone()] || '-';

        // ---- 区域判定 (仍然保留 targetRow 供 B 模块使用) ----
        if (smooth.valid && readingRegions.length > 0) {
            targetRow = determineLine(smooth.y, readingRegions);
        } else {
            targetRow = -1;
        }

        // 更新面板
        updatePanel(raw, smooth, zoneLabel);

        return {
            user_state: userState,
            gaze_point: { x: Math.round(smooth.x), y: Math.round(smooth.y) },
            target_row: targetRow,
            alert_level: alertLevel,
        };
    }

    // ============================================================
    //  区域判定
    // ============================================================

    function determineLine(gazeY, regions) {
        for (let region of regions) {
            if (gazeY >= region.top && gazeY <= region.bottom) {
                return region.index;
            }
        }
        return -1;
    }

    // ============================================================
    //  UI 更新
    // ============================================================

    function updatePanel(raw, smooth, zoneLabel) {
        if (raw.valid) {
            elRawCoords.textContent =
                Math.round(raw.x) + ', ' + Math.round(raw.y);
            elConfidence.textContent =
                (raw.confidence * 100).toFixed(0) + '%';
        } else {
            elRawCoords.textContent = '无数据';
            elConfidence.textContent = '-';
        }

        if (smooth.valid) {
            elSmoothCoords.textContent =
                Math.round(smooth.x) + ', ' + Math.round(smooth.y);
        } else {
            elSmoothCoords.textContent = '-';
        }

        // 状态 Badge
        let badgeClass = 'badge-focused';
        let stateLabel = 'Focused';
        if (userState === 'Distracted') {
            badgeClass = 'badge-distracted';
            stateLabel = 'Distracted';
        } else if (userState === 'Struggling') {
            badgeClass = 'badge-struggling';
            stateLabel = 'Struggling';
        }
        elUserState.innerHTML =
            '<span class="badge ' + badgeClass + '">' + stateLabel + '</span>';

        elTargetRow.textContent =
            targetRow >= 0 ? '段落 ' + targetRow : '无';
        elAlertLevel.textContent = alertLevel;
        elGazeZone.textContent = zoneLabel || '-';
    }

    // ============================================================
    //  启动
    // ============================================================
    // 页面加载完成后, 显示校准引导遮罩
    // (用户点击按钮后才启动)
    }); // ← DOMContentLoaded 回调结束
    </script>

</body>
</html>
